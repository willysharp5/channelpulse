<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE8CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" />

  <!-- Lightning bolt -->
  <path d="M290 80 L180 240 L240 240 L220 432 L340 250 L270 250 L290 80 Z"
        fill="url(#boltGradient)"
        stroke="#E8941A"
        stroke-width="4"
        stroke-linejoin="round"/>
</svg>
